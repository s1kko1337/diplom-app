name: Deploy to GitHub Pages

on:
  # Деплой при каждом пуше в main
  push:
    branches: [main]
  # Возможность запустить вручную из вкладки Actions
  workflow_dispatch:

# Права, нужные официальным Pages-экшенам
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем несколько деплоев параллельно; новый отменяет предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
